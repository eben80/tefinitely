<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; font-family: sans-serif; padding: 10px; background: #1e1e1e; color: white; }
        h1 { font-size: 18px; color: gold; }
        input { width: 100%; padding: 5px; margin: 10px 0; background: #222; color: white; border: 1px solid #555; }
        button { background: #444; color: white; border: none; padding: 8px; width: 100%; cursor: pointer; border-radius: 5px; }
        #status { margin-top: 10px; font-size: 12px; }
        .premium { color: gold; font-weight: bold; }
        .shop-link { display: block; margin-top: 15px; text-align: center; color: gold; text-decoration: none; font-size: 13px; border: 1px solid gold; padding: 8px; border-radius: 5px; transition: background 0.3s; }
        .shop-link:hover { background: rgba(255, 215, 0, 0.1); }
    </style>
</head>
<body>
    <h1>FolScan Premium</h1>
    <div id="status">Checking status...</div>
    <a href="https://tefinitely.lemonsqueezy.com/" target="_blank" class="shop-link">🛒 Get Premium / Upgrade</a>
    <div id="license-form" style="display: none;">
        <p>Enter your license key to activate premium features.</p>
        <input type="text" id="license-key" placeholder="Enter key (e.g. MOCK-PREMIUM-KEY)" />
        <button id="activate-btn">Activate Premium</button>
    </div>
    <div id="active-info" style="display: none;">
        <p>Status: <span class="premium">Premium Active</span></p>
        <button id="deactivate-btn">Deactivate License</button>
    </div>
    <script src="popup.js"></script>
</body>
</html>
